<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Containerised weapon systems">
  <!-- tile -->
  <rect width="64" height="64" rx="13" fill="#0E1113"/>
  <rect x="1.75" y="1.75" width="60.5" height="60.5" rx="11.25" fill="none" stroke="#333d44" stroke-width="1.5"/>
  <!-- three missiles erecting from the open box, centre tallest -->
  <g>
    <rect x="16" y="18" width="7" height="24" rx="3.5" fill="#C0522E"/>
    <path d="M16 21 L19.5 13 L23 21 Z" fill="#E8E2D4"/>
    <rect x="28.5" y="11" width="7" height="31" rx="3.5" fill="#C0522E"/>
    <path d="M28.5 14 L32 5 L35.5 14 Z" fill="#E8E2D4"/>
    <rect x="41" y="18" width="7" height="24" rx="3.5" fill="#C0522E"/>
    <path d="M41 21 L44.5 13 L48 21 Z" fill="#E8E2D4"/>
  </g>
  <!-- open container base -->
  <rect x="7" y="38" width="50" height="18" rx="2.5" fill="#F5A623"/>
  <g stroke="#b9770d" stroke-width="2.2" stroke-linecap="round">
    <line x1="16" y1="42" x2="16" y2="52"/>
    <line x1="24" y1="42" x2="24" y2="52"/>
    <line x1="32" y1="42" x2="32" y2="52"/>
    <line x1="40" y1="42" x2="40" y2="52"/>
    <line x1="48" y1="42" x2="48" y2="52"/>
  </g>
  <rect x="7" y="38" width="4.5" height="18" rx="2" fill="#c47f10"/>
  <rect x="52.5" y="38" width="4.5" height="18" rx="2" fill="#c47f10"/>
</svg>
