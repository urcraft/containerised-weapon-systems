<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Containerised weapon systems">
  <!-- tile -->
  <rect width="64" height="64" rx="13" fill="#0E1113"/>
  <rect x="1.75" y="1.75" width="60.5" height="60.5" rx="11.25" fill="none" stroke="#333d44" stroke-width="1.5"/>

  <!-- erecting missile rising from the open box -->
  <g transform="rotate(22 36 30)">
    <rect x="32.5" y="9" width="7" height="26" rx="3.5" fill="#C0522E"/>
    <path d="M32.5 12 L36 3 L39.5 12 Z" fill="#E8E2D4"/>
    <rect x="32.5" y="20" width="7" height="2.4" fill="#0E1113" opacity=".3"/>
    <path d="M32.5 33 L30 39 L34 35 Z" fill="#F5A623"/>
    <path d="M39.5 33 L42 39 L38 35 Z" fill="#F5A623"/>
  </g>

  <!-- container body -->
  <rect x="8" y="31" width="48" height="21" rx="2.5" fill="#F5A623"/>
  <!-- corrugation grooves -->
  <g stroke="#b9770d" stroke-width="2.2" stroke-linecap="round">
    <line x1="18" y1="35.5" x2="18" y2="47.5"/>
    <line x1="25" y1="35.5" x2="25" y2="47.5"/>
    <line x1="32" y1="35.5" x2="32" y2="47.5"/>
    <line x1="39" y1="35.5" x2="39" y2="47.5"/>
    <line x1="46" y1="35.5" x2="46" y2="47.5"/>
  </g>
  <!-- end frames / corner castings -->
  <rect x="8" y="31" width="4.5" height="21" rx="2" fill="#c47f10"/>
  <rect x="51.5" y="31" width="4.5" height="21" rx="2" fill="#c47f10"/>
</svg>
